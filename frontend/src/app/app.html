<main class="main">
  <div class="min-h-screen bg-gray-200 py-4">
    <div class="max-w-screen-lg mx-auto">
      <div class="flex items-center gap-4 p-6">
        <div class="w-1/8 text-center">
          <span class="text-xl">
            รหัสสินค้า
          </span>
        </div>
        <div class="w-2/2">
          <input #productIdInput FormatProductIDInput maxlength="35" class="w-full border h-10 w-100 px-2"/>
        </div>
        <div class="w-1/8 text-center">
          <button
            [disabled]="productIdInput.value.length !== 35"
            (click)="addProduct(productIdInput.value)"
            class="bg-blue-800 text-white px-4 py-1 rounded cursor-pointer disabled:bg-gray-400 disabled:cursor-not-allowed"
          >
            Add
          </button>
        </div>
      </div>
      <products></products>
    </div>
  </div>
</main>

<router-outlet />
